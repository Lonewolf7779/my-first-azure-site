<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniDash | Live Market & Weather</title>
    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        .navbar { display: flex; justify-content: space-around; padding: 20px; background: #1e293b88; backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #ffffff11; }
        .nav-item { cursor: pointer; padding: 10px 20px; border-radius: 8px; transition: 0.3s; font-weight: 600; opacity: 0.7; }
        .nav-item.active { background: var(--primary); opacity: 1; box-shadow: 0 0 20px #6366f155; }

        .hero { padding: 80px 20px; text-align: center; }
        .hero h1 { font-size: 3.5rem; margin: 0; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; min-height: 400px; }
        
        /* Dashboard Card */
        .data-card { background: var(--card); border-radius: 24px; padding: 40px; border: 1px solid #ffffff11; display: none; transform: translateY(20px); opacity: 0; }
        .data-card.active { display: block; }

        .price-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .price-item { background: #0f172a88; padding: 20px; border-radius: 15px; border: 1px solid #ffffff05; text-align: center; }
        .price-item h4 { margin: 0; color: #94a3b8; font-size: 0.9rem; }
        .price-item p { font-size: 1.8rem; font-weight: bold; margin: 10px 0; color: var(--primary); }

        .loading-spinner { display: none; color: var(--primary); font-size: 2rem; margin: 50px auto; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-item active" onclick="showTab('fuel', this)"><i class="fas fa-gas-pump"></i> Fuel</div>
    <div class="nav-item" onclick="showTab('metals', this)"><i class="fas fa-coins"></i> Metals</div>
    <div class="nav-item" onclick="showTab('weather', this)"><i class="fas fa-cloud-sun"></i> Weather</div>
</nav>

<div class="hero">
    <h1 id="main-title">Vadodara Live Insight</h1>
    <p>Powered by TecnoPrism Cloud Infrastructure</p>
</div>

<div class="container">
    <div id="loader" class="loading-spinner"><i class="fas fa-spinner fa-spin"></i></div>

    <!-- Fuel Tab -->
    <div id="fuel" class="data-card active">
        <h2>Live Fuel Prices</h2>
        <div class="price-grid">
            <div class="price-item"><h4>Petrol (Regular)</h4><p id="petrol-val">₹94.52</p></div>
            <div class="price-item"><h4>Diesel</h4><p id="diesel-val">₹89.76</p></div>
        </div>
    </div>

    <!-- Metals Tab -->
    <div id="metals" class="data-card">
        <h2>Commodity Markets</h2>
        <div class="price-grid">
            <div class="price-item"><h4>Gold (24K/10g)</h4><p id="gold-val">₹72,450</p></div>
            <div class="price-item"><h4>Silver (1kg)</h4><p id="silver-val">₹84,200</p></div>
        </div>
    </div>

    <!-- Weather Tab -->
    <div id="weather" class="data-card">
        <h2>Local Weather</h2>
        <div class="price-grid">
            <div class="price-item"><h4>Temperature</h4><p id="temp-val">32°C</p></div>
            <div class="price-item"><h4>Condition</h4><p id="cond-val">Sunny</p></div>
        </div>
    </div>
</div>

<script>
    // GSAP Initial Animation
    gsap.from(".hero h1", { duration: 1.5, y: -50, opacity: 0, ease: "bounce" });
    gsap.to(".data-card.active", { duration: 0.8, y: 0, opacity: 1, ease: "power2.out" });

    function showTab(tabId, el) {
        // Update Nav
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');

        // Animation for switching tabs
        gsap.to(".data-card.active", { duration: 0.3, y: 20, opacity: 0, display: 'none', onComplete: () => {
            document.querySelectorAll('.data-card').forEach(c => c.classList.remove('active'));
            const newTab = document.getElementById(tabId);
            newTab.classList.add('active');
            newTab.style.display = 'block';
            gsap.to(newTab, { duration: 0.5, y: 0, opacity: 1 });
        }});
    }

    // This is where your API integration will eventually update real values
    async function fetchData() {
        try {
            const response = await fetch('/api/GetPrices');
            const data = await response.json();
            document.getElementById('petrol-val').innerText = data.petrol_vadodara;
            document.getElementById('gold-val').innerText = data.gold;
        } catch (e) { console.log("Offline mode"); }
    }
    
    window.onload = fetchData;
</script>

</body>
</html>
